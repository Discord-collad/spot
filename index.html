<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="192.png">
  <title>Music Player PWA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #000; color: #fff; touch-action: pan-y; }
    /* Botón hamburguesa */
    .menu-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
      background: #1DB954; border: none; color: #000; font-size: 24px; width: 48px; height: 48px;
      border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 260px; background: #000; padding: 24px 16px; display: flex; flex-direction: column;
      gap: 32px; border-right: 1px solid #282828; transition: transform 0.3s ease; z-index: 150;
    }
    .logo { font-size: 24px; font-weight: bold; color: #1DB954; display: flex; align-items: center; gap: 10px; }
    .logo i { font-size: 28px; }
    nav ul { list-style: none; }
    nav li {
      padding: 12px 16px; margin: 4px 0; border-radius: 8px; font-size: 16px; font-weight: 500;
      color: #b3b3b3; cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: 0.2s;
    }
    nav li i { width: 24px; font-size: 20px; }
    nav li:hover, nav li.active { color: #fff; background: #282828; }
    .playlist-info { margin-top: auto; padding: 16px; font-size: 14px; color: #b3b3b3; border-top: 1px solid #282828; cursor: pointer; }
    .main-content { flex: 1; background: #121212; overflow-y: auto; padding: 20px 30px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .top-bar h2 { font-size: 28px; font-weight: 700; }
    .search-box { background: #242424; border-radius: 500px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
    .search-box input { background: transparent; border: none; color: white; font-size: 16px; padding: 8px 0; outline: none; width: 220px; }
    .folder-btn { background: #1DB954; border: none; color: #000; padding: 10px 18px; border-radius: 500px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; transition: 0.2s; }
    .folder-btn:active { transform: scale(0.97); }
    .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 100px; }
    .card { background: #181818; border-radius: 12px; padding: 12px; transition: 0.2s; cursor: pointer; position: relative; }
    .card:hover { background: #282828; transform: translateY(-4px); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
    .card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card p { font-size: 12px; color: #b3b3b3; }
    .card .fav-icon { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); }
    .card .fav-icon.favorited i { color: #1DB954; }
    .player {
      position: fixed; bottom: 0; left: 0; right: 0; background: rgba(24,24,24,0.98); backdrop-filter: blur(10px);
      border-top: 1px solid #282828; padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; z-index: 100;
    }
    .player-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .player-info { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 2; }
    .player-info img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .track-details { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
    .track-details h4 { font-size: 14px; font-weight: 600; }
    .track-details p { font-size: 12px; color: #b3b3b3; }
    .player-actions { display: flex; align-items: center; gap: 10px; }
    .player-actions button { background: none; border: none; color: #b3b3b3; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
    .player-actions button:active { transform: scale(0.92); }
    .player-control-buttons { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 4px; }
    .player-control-buttons button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
    .player-control-buttons button:active { transform: scale(0.94); }
    .player-control-buttons .play-pause { background: #1DB954; color: #000; width: 52px; height: 52px; font-size: 26px; }
    .progress-container { display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 4px; }
    .progress-container span { font-size: 12px; color: #b3b3b3; min-width: 38px; }
    #progress { flex: 1; height: 5px; -webkit-appearance: none; background: #535353; border-radius: 5px; }
    #progress::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #1DB954; border-radius: 50%; cursor: pointer; }
    .favorite-icon { cursor: pointer; color: #b3b3b3; font-size: 22px; margin-left: 8px; transition: 0.1s; }
    .favorite-icon:active { transform: scale(0.9); }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 400; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #282828; border-radius: 24px; max-width: 90%; width: 400px; max-height: 80%; overflow-y: auto; padding: 24px; position: relative; }
    .modal-content h3 { margin-bottom: 16px; color: #1DB954; font-size: 20px; }
    .modal-content p { font-size: 14px; line-height: 1.5; white-space: pre-wrap; color: #ddd; }
    .close-modal { position: absolute; top: 12px; right: 18px; font-size: 28px; cursor: pointer; color: #b3b3b3; }
    .credit { text-align: center; font-size: 12px; font-weight: 500; color: #1DB954; padding: 20px 0 80px; margin-top: 20px; border-top: 1px solid #282828; letter-spacing: 0.5px; }
    /* Responsive móvil */
    @media (max-width: 768px) {
      .menu-toggle { display: flex; align-items: center; justify-content: center; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); z-index: 300; background: #000; width: 75%; max-width: 260px; box-shadow: 2px 0 8px rgba(0,0,0,0.5); }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 16px; padding-top: 60px; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .search-box, .search-box input { width: 100%; }
      .folder-btn { width: 100%; justify-content: center; }
      .songs-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
      .player-info img { width: 40px; height: 40px; }
      .player-control-buttons button { width: 38px; height: 38px; font-size: 18px; }
      .player-control-buttons .play-pause { width: 48px; height: 48px; font-size: 24px; }
      .player-actions button { width: 38px; height: 38px; font-size: 18px; }
      .credit { font-size: 11px; padding-bottom: 70px; }
    }
  </style>
</head>
<body>
<button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo"><i class="fas fa-music"></i><span>MusicApp</span></div>
    <nav>
      <ul>
        <li class="active" data-nav="home"><i class="fas fa-home"></i> Inicio</li>
        <li data-nav="search"><i class="fas fa-search"></i> Buscar</li>
        <li data-nav="library"><i class="fas fa-book"></i> Biblioteca</li>
        <li data-nav="favorites"><i class="fas fa-heart"></i> Favoritos</li>
      </ul>
    </nav>
    <div class="playlist-info"><p><i class="fas fa-plus-circle"></i> Crear playlist</p></div>
  </aside>
  <main class="main-content">
    <div class="top-bar">
      <h2 id="section-title">Inicio</h2>
      <div class="search-box" id="search-box" style="display:none;">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="¿Qué quieres escuchar?">
      </div>
      <button id="folderPickerBtn" class="folder-btn"><i class="fas fa-folder-open"></i> 📁 Abrir carpeta</button>
    </div>
    <div class="songs-grid" id="songs-grid"></div>
    <div class="credit">🎧 echo por Josué - INO 🎧</div>
  </main>
  <footer class="player">
    <div class="player-top">
      <div class="player-info">
        <img id="current-img" src="192.png" alt="cover">
        <div class="track-details">
          <h4 id="current-title">Ninguna canción</h4>
          <p id="current-artist">-</p>
        </div>
        <div class="favorite-icon" id="player-fav"><i class="far fa-heart"></i></div>
      </div>
      <div class="player-actions">
        <button id="lyricsBtn" title="Letras"><i class="fas fa-align-left"></i></button>
      </div>
    </div>
    <div class="player-control-buttons">
      <button id="shuffleBtn"><i class="fas fa-random"></i></button>
      <button id="prevBtn"><i class="fas fa-backward-step"></i></button>
      <button id="play-pause" class="play-pause"><i class="fas fa-play"></i></button>
      <button id="nextBtn"><i class="fas fa-forward-step"></i></button>
      <button id="repeatBtn"><i class="fas fa-repeat"></i></button>
    </div>
    <div class="progress-container">
      <span id="current-time">0:00</span>
      <input type="range" id="progress" value="0" step="0.01">
      <span id="duration">0:00</span>
    </div>
  </footer>
</div>
<audio id="audio" preload="metadata"></audio>
<div id="lyricsModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h3 id="modal-song-title">Letra</h3>
    <p id="modal-lyrics-text">Cargando...</p>
  </div>
</div>

<script>
  (function(){
    // ========== LISTA INICIAL ==========
    let songs = [
      { id: 1, title: "Trap 2020", artist: "Exclusive Banger", cover: "trap.jpg", audio: "trap_2020.mp3", isLocal: false, lyrics: "🔥 Letra no disponible aún." },
      { id: 2, title: "Rotos", artist: "Artista X", cover: "rotos.jpg", audio: "Rotos.mp3", isLocal: false, lyrics: "💔 Letra no disponible." },
      { id: 3, title: "Softcore", artist: "Artista Y", cover: "softcore.jpg", audio: "Softcore.mp3", isLocal: false, lyrics: "🎵 Letra no disponible." }
    ];
    let nextId = 4;
    let currentSongIndex = 0;
    let isPlaying = false;
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentNav = "home";
    let searchQuery = "";
    let shuffleActive = false;
    let repeatMode = "off";

    // IndexedDB
    let db = null;
    const DB_NAME = "MusicPlayerDB";
    const STORE_NAME = "localSongs";

    // DOM elements
    const audioEl = document.getElementById("audio");
    const playPauseBtn = document.getElementById("play-pause");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const lyricsBtn = document.getElementById("lyricsBtn");
    const progress = document.getElementById("progress");
    const currentTimeSpan = document.getElementById("current-time");
    const durationSpan = document.getElementById("duration");
    const currentImg = document.getElementById("current-img");
    const currentTitle = document.getElementById("current-title");
    const currentArtist = document.getElementById("current-artist");
    const songsGrid = document.getElementById("songs-grid");
    const sectionTitle = document.getElementById("section-title");
    const searchBox = document.getElementById("search-box");
    const searchInput = document.getElementById("search-input");
    const playerFav = document.getElementById("player-fav");
    const folderPickerBtn = document.getElementById("folderPickerBtn");
    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const modal = document.getElementById("lyricsModal");
    const modalTitle = document.getElementById("modal-song-title");
    const modalText = document.getElementById("modal-lyrics-text");
    const closeModal = document.querySelector(".close-modal");

    // ========== UTILIDADES ==========
    function saveFavorites() { localStorage.setItem('favorites', JSON.stringify(favorites)); }
    function isFavorite(id) { return favorites.includes(id); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
    function formatTime(sec) { if (isNaN(sec)) return "0:00"; const mins = Math.floor(sec/60); const secs = Math.floor(sec%60); return `${mins}:${secs<10?'0':''}${secs}`; }

    function toggleFavorite(id) {
      const idx = favorites.indexOf(id);
      if (idx === -1) favorites.push(id); else favorites.splice(idx, 1);
      saveFavorites();
      renderSongs();
      updatePlayerFavoriteIcon();
    }
    function updatePlayerFavoriteIcon() {
      if (!songs[currentSongIndex]) return;
      if (isFavorite(songs[currentSongIndex].id)) {
        playerFav.innerHTML = '<i class="fas fa-heart"></i>';
        playerFav.classList.add("favorited");
      } else {
        playerFav.innerHTML = '<i class="far fa-heart"></i>';
        playerFav.classList.remove("favorited");
      }
    }

    // ========== INDEXEDDB ==========
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 2);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };
      });
    }
    async function saveLocalSong(song) {
      if (!song.fileBlob) return;
      if (!db) db = await openDB();
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.put({
        id: song.id,
        title: song.title,
        artist: song.artist,
        audioBlob: song.fileBlob,
        coverBlob: song.coverBlob || null,
        lyrics: song.lyrics || "Letra no disponible."
      });
      await tx.complete;
    }
    async function loadLocalSongsFromDB() {
      if (!db) db = await openDB();
      const store = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME);
      const all = await new Promise((resolve, reject) => {
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      for (const record of all) {
        try {
          const audioBlobURL = URL.createObjectURL(record.audioBlob);
          let coverURL = "192.png";
          if (record.coverBlob) coverURL = URL.createObjectURL(record.coverBlob);
          const newSong = {
            id: record.id,
            title: record.title,
            artist: record.artist,
            cover: coverURL,
            audio: audioBlobURL,
            isLocal: true,
            fileBlob: record.audioBlob,
            coverBlob: record.coverBlob,
            lyrics: record.lyrics || "Letra no disponible."
          };
          if (!songs.some(s => s.id === record.id)) {
            songs.push(newSong);
            if (record.id >= nextId) nextId = record.id + 1;
          }
        } catch(e) { console.warn("Error restaurando canción:", e); }
      }
      renderSongs();
    }

    // ========== EMPAREJAMIENTO INTELIGENTE DE PORTADAS ==========
    function normalize(str) {
      return str.toLowerCase()
        .replace(/\(.*?\)/g, '')
        .replace(/\[.*?\]/g, '')
        .replace(/[^\w\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }
    function similarityScore(title, imgBase) {
      const tNorm = normalize(title);
      const iNorm = normalize(imgBase);
      if (tNorm === iNorm) return 1;
      if (tNorm.includes(iNorm) || iNorm.includes(tNorm)) return 0.8;
      const tWords = tNorm.split(' ');
      const iWords = iNorm.split(' ');
      const common = tWords.filter(w => iWords.includes(w)).length;
      if (common > 0) return common / Math.max(tWords.length, iWords.length) * 0.7;
      return 0;
    }

    // ========== SELECCIÓN DE CARPETA ==========
    async function selectMusicFolder() {
      if (!window.showDirectoryPicker) { alert("Usa Chrome en Android con HTTPS."); return; }
      try {
        const dirHandle = await window.showDirectoryPicker();
        const mp3s = [];
        const images = [];
        for await (const entry of dirHandle.values()) {
          if (entry.kind !== 'file') continue;
          const name = entry.name;
          const lower = name.toLowerCase();
          if (lower.endsWith('.mp3')) mp3s.push(entry);
          else if (lower.match(/\.(jpg|jpeg|png)$/)) {
            const base = name.replace(/\.(jpg|jpeg|png)$/i, '');
            images.push({ name: base, handle: entry, original: name });
          }
        }
        if (!mp3s.length) { alert("No hay MP3 en esta carpeta"); return; }
        let added = 0, matched = 0;
        for (const mp3 of mp3s) {
          const file = await mp3.getFile();
          const title = file.name.replace(/\.mp3$/i, '');
          let bestScore = 0, bestImg = null;
          for (const img of images) {
            const score = similarityScore(title, img.name);
            if (score > bestScore) { bestScore = score; bestImg = img; }
          }
          let coverBlob = null, coverURL = "192.png";
          if (bestImg && bestScore >= 0.5) {
            const imgFile = await bestImg.handle.getFile();
            coverBlob = imgFile;
            coverURL = URL.createObjectURL(imgFile);
            matched++;
          }
          const audioBlob = await file.slice(0, file.size, file.type);
          const newSong = {
            id: nextId++,
            title: title,
            artist: "Local",
            cover: coverURL,
            audio: URL.createObjectURL(audioBlob),
            isLocal: true,
            fileBlob: audioBlob,
            coverBlob: coverBlob,
            lyrics: `Letra de "${title}" no disponible aún.`
          };
          songs.push(newSong);
          await saveLocalSong(newSong);
          added++;
        }
        alert(`✅ ${added} canciones agregadas.\n🖼️ Portadas encontradas: ${matched}/${added}`);
        renderSongs();
        if (songs.length && !audioEl.src) setCurrentAndPlay(0);
      } catch(err) { if (err.name !== 'AbortError') alert("Error: " + err.message); }
    }

    // ========== RENDER GRID ==========
    function renderSongs() {
      let filtered = songs.filter(s =>
        searchQuery === "" || s.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        s.artist.toLowerCase().includes(searchQuery.toLowerCase())
      );
      if (currentNav === "favorites") filtered = filtered.filter(s => isFavorite(s.id));
      if (!filtered.length) {
        songsGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center">No hay canciones.</p>`;
        return;
      }
      songsGrid.innerHTML = filtered.map(song => `
        <div class="card" data-id="${song.id}">
          <div class="fav-icon ${isFavorite(song.id) ? 'favorited' : ''}" data-id="${song.id}">
            <i class="${isFavorite(song.id) ? 'fas fa-heart' : 'far fa-heart'}"></i>
          </div>
          <img src="${song.cover}" alt="${song.title}" onerror="this.src='192.png'">
          <h4>${escapeHtml(song.title)}</h4>
          <p>${escapeHtml(song.artist)}</p>
        </div>
      `).join("");
      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest(".fav-icon")) return;
          const id = parseInt(card.dataset.id);
          const idx = songs.findIndex(s => s.id === id);
          if (idx !== -1) setCurrentAndPlay(idx);
        });
        const favDiv = card.querySelector(".fav-icon");
        favDiv.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(parseInt(favDiv.dataset.id)); });
      });
    }

    // ========== PLAYER ==========
    function setCurrentAndPlay(index) {
      if (index < 0) index = 0;
      if (index >= songs.length) index = songs.length - 1;
      currentSongIndex = index;
      const s = songs[currentSongIndex];
      audioEl.src = s.audio;
      currentImg.src = s.cover;
      currentTitle.textContent = s.title;
      currentArtist.textContent = s.artist;
      updatePlayerFavoriteIcon();
      audioEl.play().then(() => { isPlaying = true; updatePlayPauseButton(); }).catch(() => {});
    }
    function updatePlayPauseButton() { playPauseBtn.querySelector("i").className = isPlaying ? "fas fa-pause" : "fas fa-play"; }
    function togglePlayPause() {
      if (!songs.length) return;
      if (isPlaying) audioEl.pause(); else audioEl.play();
      isPlaying = !isPlaying;
      updatePlayPauseButton();
    }
    function nextSong() {
      if (!songs.length) return;
      if (shuffleActive) {
        let newIdx; do { newIdx = Math.floor(Math.random() * songs.length); } while (newIdx === currentSongIndex && songs.length > 1);
        setCurrentAndPlay(newIdx);
      } else {
        let newIdx = currentSongIndex + 1;
        if (newIdx >= songs.length) { if (repeatMode === "all") newIdx = 0; else return; }
        setCurrentAndPlay(newIdx);
      }
    }
    function prevSong() {
      if (!songs.length) return;
      if (shuffleActive) {
        let newIdx; do { newIdx = Math.floor(Math.random() * songs.length); } while (newIdx === currentSongIndex && songs.length > 1);
        setCurrentAndPlay(newIdx);
      } else {
        let newIdx = currentSongIndex - 1;
        if (newIdx < 0) { if (repeatMode === "all") newIdx = songs.length - 1; else return; }
        setCurrentAndPlay(newIdx);
      }
    }
    function toggleShuffle() { shuffleActive = !shuffleActive; shuffleBtn.style.color = shuffleActive ? "#1DB954" : "white"; }
    function toggleRepeat() {
      if (repeatMode === "off") repeatMode = "one";
      else if (repeatMode === "one") repeatMode = "all";
      else repeatMode = "off";
      repeatBtn.innerHTML = repeatMode === "one" ? '<i class="fas fa-repeat-1"></i>' : '<i class="fas fa-repeat"></i>';
      repeatBtn.style.color = repeatMode !== "off" ? "#1DB954" : "white";
    }
    function showLyrics() {
      if (!songs[currentSongIndex]) return;
      modalTitle.textContent = `${songs[currentSongIndex].title} - Letra`;
      modalText.textContent = songs[currentSongIndex].lyrics || "No hay letra disponible.";
      modal.style.display = "flex";
    }

    // Audio events
    audioEl.addEventListener("ended", () => { if (repeatMode === "one") setCurrentAndPlay(currentSongIndex); else nextSong(); });
    audioEl.addEventListener("timeupdate", () => {
      if (audioEl.duration && !isNaN(audioEl.duration)) {
        progress.value = (audioEl.currentTime / audioEl.duration) * 100;
        currentTimeSpan.textContent = formatTime(audioEl.currentTime);
        durationSpan.textContent = formatTime(audioEl.duration);
      }
    });
    audioEl.addEventListener("loadedmetadata", () => { durationSpan.textContent = formatTime(audioEl.duration); progress.value = 0; });
    progress.addEventListener("input", (e) => { if (audioEl.duration) audioEl.currentTime = (e.target.value / 100) * audioEl.duration; });

    // Event listeners
    playPauseBtn.addEventListener("click", togglePlayPause);
    prevBtn.addEventListener("click", prevSong);
    nextBtn.addEventListener("click", nextSong);
    shuffleBtn.addEventListener("click", toggleShuffle);
    repeatBtn.addEventListener("click", toggleRepeat);
    playerFav.addEventListener("click", () => { if (songs[currentSongIndex]) toggleFavorite(songs[currentSongIndex].id); });
    folderPickerBtn.addEventListener("click", selectMusicFolder);
    lyricsBtn.addEventListener("click", showLyrics);
    closeModal.addEventListener("click", () => modal.style.display = "none");
    window.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });

    // Navegación
    document.querySelectorAll("nav li").forEach(item => {
      item.addEventListener("click", () => {
        const nav = item.dataset.nav;
        currentNav = nav;
        searchQuery = "";
        searchInput.value = "";
        document.querySelectorAll("nav li").forEach(li => li.classList.remove("active"));
        item.classList.add("active");
        if (nav === "home") { sectionTitle.textContent = "Inicio"; searchBox.style.display = "none"; }
        else if (nav === "search") { sectionTitle.textContent = "Buscar"; searchBox.style.display = "flex"; searchInput.focus(); }
        else if (nav === "library") { sectionTitle.textContent = "Biblioteca"; searchBox.style.display = "none"; }
        else if (nav === "favorites") { sectionTitle.textContent = "Favoritos"; searchBox.style.display = "none"; }
        renderSongs();
        if (window.innerWidth <= 768) sidebar.classList.remove("open");
      });
    });
    searchInput.addEventListener("input", (e) => { if (currentNav === "search") { searchQuery = e.target.value; renderSongs(); } });
    menuToggle.addEventListener("click", () => sidebar.classList.toggle("open"));
    document.addEventListener("click", (e) => {
      if (window.innerWidth <= 768 && sidebar.classList.contains("open") && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
        sidebar.classList.remove("open");
      }
    });

    // Inicialización
    (async function init() {
      try {
        db = await openDB();
        await loadLocalSongsFromDB();
      } catch(e) { console.error("DB error:", e); }
      renderSongs();
      document.querySelector('nav li[data-nav="home"]').classList.add("active");
      sectionTitle.textContent = "Inicio";
      searchBox.style.display = "none";
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(e => console.error("SW error:", e));
      }
    })();
  })();
</script>
</body>
</html>
